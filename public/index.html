<!DOCTYPE html>
<html>
<head>
  <title>ZG Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#075e54"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="ZG Connect"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
    body{background:#e5ddd5;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

    /* AUTH SCREEN */
    #auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#075e54;padding:30px;gap:15px;}
    #auth-screen h1{color:white;font-size:28px;margin-bottom:10px;}
    #auth-screen p{color:rgba(255,255,255,0.8);font-size:14px;color:#ccc;}
    .auth-input{width:100%;max-width:340px;padding:14px;font-size:15px;border:none;border-radius:25px;outline:none;}
    .auth-btn{width:100%;max-width:340px;padding:14px;background:#25d366;color:white;border:none;border-radius:25px;font-size:16px;font-weight:bold;cursor:pointer;}
    .auth-btn:hover{background:#128c7e;}
    .auth-switch{color:#ccc;font-size:14px;cursor:pointer;text-decoration:underline;background:none;border:none;}
    .auth-error{color:#ff6b6b;font-size:13px;text-align:center;}

    /* MAIN APP */
    #app{display:none;flex-direction:column;height:100vh;}

    /* TOP BAR */
    #topbar{background:#075e54;color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
    #topbar h2{font-size:18px;}
    #new-group-btn{background:#25d366;border:none;color:white;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px;}

    /* TABS */
    #tabs{display:flex;background:#075e54;border-top:1px solid #128c7e;}
    .tab{flex:1;padding:10px;text-align:center;color:#ccc;cursor:pointer;font-size:14px;border-bottom:2px solid transparent;}
    .tab.active{color:white;border-bottom:2px solid #25d366;}

    /* CHAT LIST */
    #chat-list-screen{flex:1;overflow-y:auto;background:#f0f0f0;}
    .chat-item{display:flex;align-items:center;padding:12px 16px;background:white;border-bottom:1px solid #eee;cursor:pointer;gap:12px;}
    .chat-item:hover{background:#f5f5f5;}
    .avatar{width:48px;height:48px;border-radius:50%;background:#075e54;color:white;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;flex-shrink:0;}
    .chat-info{flex:1;}
    .chat-name{font-weight:bold;font-size:15px;color:#333;}
    .chat-preview{font-size:13px;color:#999;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .online-dot{width:10px;height:10px;background:#25d366;border-radius:50%;flex-shrink:0;}
    .offline-dot{width:10px;height:10px;background:#ccc;border-radius:50%;flex-shrink:0;}
    .unread-badge{background:#25d366;color:white;border-radius:50%;width:20px;height:20px;font-size:11px;display:flex;align-items:center;justify-content:center;}

    /* CHAT SCREEN */
    #chat-screen{display:none;flex-direction:column;height:100vh;}
    #chat-topbar{background:#075e54;color:white;padding:10px 16px;display:flex;align-items:center;gap:12px;}
    #back-btn{background:none;border:none;color:white;font-size:22px;cursor:pointer;}
    #chat-avatar{width:38px;height:38px;border-radius:50%;background:#25d366;color:white;display:flex;align-items:center;justify-content:center;font-weight:bold;}
    #chat-title{font-size:16px;font-weight:bold;}
    #chat-status{font-size:12px;color:#ccc;}
    #messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;background:#e5ddd5;}
    .msg{max-width:75%;padding:8px 12px;border-radius:10px;font-size:14px;line-height:1.4;word-wrap:break-word;}
    .msg.sent{background:#dcf8c6;align-self:flex-end;border-top-right-radius:0;}
    .msg.received{background:white;align-self:flex-start;border-top-left-radius:0;}
    .msg-sender{font-size:11px;font-weight:bold;color:#075e54;margin-bottom:3px;}
    .msg-time{font-size:10px;color:#999;text-align:right;margin-top:3px;}
    #typing-indicator{padding:6px 16px;font-size:12px;color:#075e54;font-style:italic;min-height:24px;}
    #bottom-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f0f0f0;}
    #msg-input{flex:1;padding:10px 15px;font-size:15px;border:none;border-radius:25px;background:white;outline:none;}
    #send-btn{width:42px;height:42px;background:#075e54;color:white;border:none;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

    /* CREATE GROUP MODAL */
    #group-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;}
    #group-modal.show{display:flex;}
    .modal-box{background:white;border-radius:15px;padding:25px;width:90%;max-width:380px;display:flex;flex-direction:column;gap:12px;}
    .modal-box h3{font-size:18px;color:#075e54;}
    .modal-input{width:100%;padding:12px;font-size:15px;border:1px solid #ddd;border-radius:10px;outline:none;}
    .member-list{max-height:200px;overflow-y:auto;border:1px solid #ddd;border-radius:10px;}
    .member-item{display:flex;align-items:center;padding:10px;gap:10px;cursor:pointer;border-bottom:1px solid #eee;}
    .member-item:hover{background:#f5f5f5;}
    .member-item input{width:18px;height:18px;cursor:pointer;}
    .modal-btn{padding:12px;background:#075e54;color:white;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-weight:bold;}
    .modal-cancel{padding:12px;background:#eee;color:#333;border:none;border-radius:10px;font-size:15px;cursor:pointer;}

    /* NOTIFICATION */
    #notification{position:fixed;top:15px;left:50%;transform:translateX(-50%);background:#075e54;color:white;padding:12px 20px;border-radius:25px;font-size:14px;z-index:999;display:none;max-width:90%;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.3);}

    /* EMPTY STATE */
    .empty-state{text-align:center;padding:50px 20px;color:#999;}
    .empty-state div{font-size:50px;margin-bottom:10px;}
  </style>
</head>
<body>

<!-- NOTIFICATION TOAST -->
<div id="notification"></div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <h1>💬 ZG Connect</h1>
  <p id="auth-subtitle">Sign in to your account</p>
  <p class="auth-error" id="auth-error"></p>
  <input class="auth-input" id="auth-name" placeholder="Your name" style="display:none"/>
  <input class="auth-input" id="auth-email" placeholder="Email address" type="email"/>
  <input class="auth-input" id="auth-password" placeholder="Password" type="password"/>
  <button class="auth-btn" onclick="submitAuth()">Sign In</button>
  <button class="auth-switch" onclick="toggleAuth()">Don't have an account? Register</button>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- TOP BAR -->
 <div id="topbar">
  <h2>💬 ZG Connect</h2>
  <div style="display:flex;gap:10px;">
    <button onclick="openSearchModal()" style="background:#25d366;border:none;color:white;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px;">🔍 Add</button>
    <button onclick="openRequestsModal()" style="background:#128c7e;border:none;color:white;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px;">📩 Requests</button>
    <button id="profile-btn" onclick="openProfileModal()" style="background:#075e54;border:none;color:white;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px;">👤 Profile</button>
    <button id="new-group-btn" onclick="openGroupModal()" style="background:#25d366;border:none;color:white;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px;">+ Group</button>
  </div>
</div>

  <!-- TABS -->
 <div id="tabs">
  <div class="tab active" onclick="showTab('people')" id="tab-people">💬 Chats</div>
  <div class="tab" onclick="showTab('groups')" id="tab-groups">👥 Groups</div>
  <div class="tab" onclick="showTab('contacts')" id="tab-contacts">👤 Contacts</div>
</div>

  <!-- CHAT LIST -->
  <div id="chat-list-screen">
    <div id="people-list"></div>
<div id="groups-list" style="display:none"></div>
<div id="contacts-list" style="display:none"></div>
  </div>

</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <div id="chat-topbar">
    <button id="back-btn" onclick="goBack()">←</button>
    <div id="chat-avatar"></div>
    <div>
      <div id="chat-title"></div>
      <div id="chat-status"></div>
    </div>
  </div>
  <div id="messages"></div>
  <div id="typing-indicator"></div>
  <div id="bottom-bar">
    <input id="msg-input" placeholder="Type a message..." autocomplete="off"/>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- CREATE GROUP MODAL -->
 <!-- PROFILE MODAL -->
  <!-- SEARCH MODAL -->
<div id="search-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:15px;padding:25px;width:90%;max-width:380px;display:flex;flex-direction:column;gap:12px;max-height:80vh;">
    <h3 style="color:#075e54;">🔍 Add Contact</h3>
    <input id="search-input" style="padding:12px;border:1px solid #ddd;border-radius:25px;font-size:15px;outline:none;" placeholder="Search by name or phone..." oninput="searchUsers(this.value)"/>
    <div id="search-results" style="overflow-y:auto;max-height:300px;display:flex;flex-direction:column;gap:8px;"></div>
    <button onclick="closeSearchModal()" style="padding:12px;background:#eee;color:#333;border:none;border-radius:10px;font-size:15px;cursor:pointer;">Close</button>
  </div>
</div>

<!-- REQUESTS MODAL -->
<div id="requests-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:15px;padding:25px;width:90%;max-width:380px;display:flex;flex-direction:column;gap:12px;max-height:80vh;">
    <h3 style="color:#075e54;">📩 Contact Requests</h3>
    <div id="requests-list" style="overflow-y:auto;max-height:350px;display:flex;flex-direction:column;gap:8px;"></div>
    <button onclick="closeRequestsModal()" style="padding:12px;background:#eee;color:#333;border:none;border-radius:10px;font-size:15px;cursor:pointer;">Close</button>
  </div>
</div>
<div id="profile-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:15px;padding:25px;width:90%;max-width:380px;display:flex;flex-direction:column;gap:12px;">
    <h3 style="color:#075e54;">👤 My Profile</h3>

    <!-- Avatar -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div id="profile-avatar-preview" style="width:80px;height:80px;border-radius:50%;background:#075e54;display:flex;align-items:center;justify-content:center;font-size:30px;color:white;overflow:hidden;">
      </div>
      <label for="avatar-input" style="background:#25d366;color:white;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;">
        📷 Change Photo
      </label>
      <input type="file" id="avatar-input" accept="image/*" style="display:none;" onchange="uploadAvatar(this)"/>
      <span id="upload-status" style="font-size:12px;color:#999;"></span>
    </div>

    <!-- Name -->
    <label style="font-size:13px;color:#075e54;font-weight:bold;">Your Name</label>
    <input id="profile-name-input" style="padding:10px;border:1px solid #ddd;border-radius:10px;font-size:15px;" placeholder="Your name"/>

    <!-- About -->
    <label style="font-size:13px;color:#075e54;font-weight:bold;">About</label>
    <input id="profile-about-input" style="padding:10px;border:1px solid #ddd;border-radius:10px;font-size:15px;" placeholder="Hey there!"/>

    <!-- Email -->
    <label style="font-size:13px;color:#075e54;font-weight:bold;">Email</label>
    <div id="profile-email" style="padding:10px;background:#f5f5f5;border-radius:10px;color:#999;font-size:15px;"></div>

    <button onclick="saveProfile()" style="padding:12px;background:#075e54;color:white;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-weight:bold;">Save Changes</button>
    <button onclick="closeProfileModal()" style="padding:12px;background:#eee;color:#333;border:none;border-radius:10px;font-size:15px;cursor:pointer;">Cancel</button>
  </div>
</div>
<div id="group-modal">
  <div class="modal-box">
    <h3>👥 Create New Group</h3>
    <input class="modal-input" id="group-name-input" placeholder="Group name..."/>
    <p style="font-size:13px;color:#999;">Select members:</p>
    <div class="member-list" id="member-list"></div>
    <button class="modal-btn" onclick="createGroup()">Create Group</button>
    <button class="modal-cancel" onclick="closeGroupModal()">Cancel</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let token = localStorage.getItem('token');
  let currentUser = JSON.parse(localStorage.getItem('user') || 'null');
  let currentChat = null; // { type: 'private'|'group', id, name }
  let allUsers = [];
  let isRegister = false;
  let typingTimeout;
  let unreadCounts = {};

  // ==================== AUTH ====================

  function toggleAuth() {
    isRegister = !isRegister;
    document.getElementById('auth-name').style.display = isRegister ? 'block' : 'none';
    document.getElementById('auth-subtitle').textContent = isRegister ? 'Create your account' : 'Sign in to your account';
    document.querySelector('.auth-switch').textContent = isRegister ? 'Already have an account? Sign In' : "Don't have an account? Register";
    document.querySelector('.auth-btn').textContent = isRegister ? 'Register' : 'Sign In';
    document.getElementById('auth-error').textContent = '';
  }

  async function submitAuth() {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value.trim();
    const name = document.getElementById('auth-name').value.trim();
    const errorEl = document.getElementById('auth-error');

    if (!email || !password) { errorEl.textContent = 'Please fill all fields!'; return; }
    if (isRegister && !name) { errorEl.textContent = 'Please enter your name!'; return; }

    const url = isRegister ? '/api/auth/register' : '/api/auth/login';
    const body = isRegister ? { name, email, password } : { email, password };

    try {
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { errorEl.textContent = data.message; return; }
      token = data.token;
      currentUser = data.user;
      localStorage.setItem('token', token);
      localStorage.setItem('user', JSON.stringify(currentUser));
      startApp();
    } catch (err) {
      errorEl.textContent = 'Something went wrong!';
    }
  }

  // Press Enter to submit auth
  document.getElementById('auth-password').addEventListener('keypress', e => { if (e.key === 'Enter') submitAuth(); });

  // ==================== APP ====================

  async function startApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    socket.emit('user-online', currentUser.id);
    await loadUsers();
    await loadGroups();
    requestNotificationPermission();
  }

  async function loadUsers() {
    const res = await fetch('/api/chat/users', { headers: { Authorization: `Bearer ${token}` } });
    allUsers = await res.json();
    renderPeople();
  }
  async function renderContacts() {
  const list = document.getElementById('contacts-list');
  try {
    const res = await fetch('/api/contacts', {
      headers: { Authorization: `Bearer ${token}` }
    });
    const contacts = await res.json();
    if (contacts.length === 0) {
      list.innerHTML = '<div class="empty-state"><div>👤</div>No contacts yet. Add some!</div>';
      return;
    }
    list.innerHTML = contacts.map(u => `
      <div class="chat-item" onclick="openPrivateChat('${u._id}','${u.name}',${u.online})">
        <div class="avatar">
          ${u.avatar ? `<img src="${u.avatar}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">` : u.name[0].toUpperCase()}
        </div>
        <div class="chat-info">
          <div class="chat-name">${u.name}</div>
          <div class="chat-preview">${u.phone || u.email}</div>
        </div>
        <div class="${u.online ? 'online-dot' : 'offline-dot'}"></div>
      </div>
    `).join('');
  } catch (err) {
    console.log('Error loading contacts:', err);
  }
}

  function renderPeople() {
    const list = document.getElementById('people-list');
    if (allUsers.length === 0) {
      list.innerHTML = '<div class="empty-state"><div>👤</div>No users yet. Ask your friends to register!</div>';
      return;
    }
    list.innerHTML = allUsers.map(u => `
      <div class="chat-item" onclick="openPrivateChat('${u._id}','${u.name}',${u.online})">
        <div class="avatar">
  ${u.avatar ? `<img src="${u.avatar}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">` : u.name[0].toUpperCase()}
</div>
        <div class="chat-info">
          <div class="chat-name">${u.name}</div>
          <div class="chat-preview">${u.online ? '🟢 Online' : '⚫ Offline'}</div>
        </div>
        ${unreadCounts[u._id] ? `<div class="unread-badge">${unreadCounts[u._id]}</div>` : ''}
      </div>
    `).join('');
  }

  async function loadGroups() {
    const res = await fetch('/api/chat/groups', { headers: { Authorization: `Bearer ${token}` } });
    const groups = await res.json();
    const list = document.getElementById('groups-list');
    if (groups.length === 0) {
      list.innerHTML = '<div class="empty-state"><div>👥</div>No groups yet. Create one!</div>';
      return;
    }
    list.innerHTML = groups.map(g => `
      <div class="chat-item" onclick="openGroupChat('${g._id}','${g.name}')">
        <div class="avatar" style="background:#128c7e;">👥</div>
        <div class="chat-info">
          <div class="chat-name">${g.name}</div>
          <div class="chat-preview">${g.members.length} members</div>
        </div>
        ${unreadCounts[g._id] ? `<div class="unread-badge">${unreadCounts[g._id]}</div>` : ''}
      </div>
    `).join('');
    // Join all group rooms
    groups.forEach(g => socket.emit('join-group', g._id));
  }

 function showTab(tab) {
  document.getElementById('people-list').style.display = tab === 'people' ? 'block' : 'none';
  document.getElementById('groups-list').style.display = tab === 'groups' ? 'block' : 'none';
  document.getElementById('contacts-list').style.display = tab === 'contacts' ? 'block' : 'none';
  document.getElementById('tab-people').classList.toggle('active', tab === 'people');
  document.getElementById('tab-groups').classList.toggle('active', tab === 'groups');
  document.getElementById('tab-contacts').classList.toggle('active', tab === 'contacts');
  if (tab === 'contacts') renderContacts();
}

  // ==================== PRIVATE CHAT ====================

  async function openPrivateChat(userId, userName, online) {
    currentChat = { type: 'private', id: userId, name: userName };
    unreadCounts[userId] = 0;
    renderPeople();

    document.getElementById('app').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('chat-title').textContent = userName;
    document.getElementById('chat-status').textContent = online ? '🟢 Online' : '⚫ Offline';
    const chatUser = allUsers.find(u => u._id === userId);
if (chatUser && chatUser.avatar) {
  document.getElementById('chat-avatar').innerHTML = `<img src="${chatUser.avatar}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;">`;
} else {
  document.getElementById('chat-avatar').textContent = userName[0].toUpperCase();
}
    document.getElementById('messages').innerHTML = '';

    const res = await fetch(`/api/chat/messages/${userId}`, { headers: { Authorization: `Bearer ${token}` } });
    const messages = await res.json();
   messages.forEach(m => {
  const isMine = m.sender === currentUser.id || m.sender === currentUser._id || String(m.sender) === String(currentUser.id);
  addMessage(m.content, isMine ? 'sent' : 'received', '', m.createdAt, m._id, m.delivered, m.read);
});
    scrollToBottom();
    document.getElementById('msg-input').focus();
  }

  // ==================== GROUP CHAT ====================

  async function openGroupChat(groupId, groupName) {
    currentChat = { type: 'group', id: groupId, name: groupName };
    unreadCounts[groupId] = 0;
    loadGroups();

    document.getElementById('app').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('chat-title').textContent = groupName;
    document.getElementById('chat-status').textContent = '👥 Group';
    document.getElementById('chat-avatar').textContent = '👥';
    document.getElementById('messages').innerHTML = '';

    const res = await fetch(`/api/chat/groups/${groupId}/messages`, { headers: { Authorization: `Bearer ${token}` } });
    const messages = await res.json();
   messages.forEach(m => addMessage(m.content, (m.sender._id === currentUser.id || m.sender._id === currentUser._id) ? 'sent' : 'received', (m.sender._id === currentUser.id || m.sender._id === currentUser._id) ? '' : m.sender.name, m.createdAt, m._id, m.delivered, m.read));
    scrollToBottom();
    document.getElementById('msg-input').focus();
  }

  // ==================== SEND MESSAGE ====================

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content || !currentChat) return;
    input.value = '';

    if (currentChat.type === 'private') {
      socket.emit('private-message', { senderId: currentUser.id, receiverId: currentChat.id, content, senderName: currentUser.name });
      addMessage(content, 'sent', '', new Date());
    } else {
      socket.emit('group-message', { senderId: currentUser.id, groupId: currentChat.id, content, senderName: currentUser.name, groupName: currentChat.name });
      addMessage(content, 'sent', '', new Date());
    }
    scrollToBottom();
  }

  // Press Enter to send
  document.getElementById('msg-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') sendMessage();
  });

  // Typing indicator
  document.getElementById('msg-input').addEventListener('input', () => {
    if (currentChat && currentChat.type === 'private') {
      socket.emit('typing', { senderId: currentUser.id, receiverId: currentChat.id, senderName: currentUser.name });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        socket.emit('stop-typing', { senderId: currentUser.id, receiverId: currentChat.id });
      }, 1500);
    }
  });

  // ==================== ADD MESSAGE TO UI ====================

  function addMessage(content, type, senderName, time, messageId, delivered, read) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.classList.add('msg', type);
  div.setAttribute('data-id', messageId || '');
  const t = new Date(time);
  const timeStr = t.getHours() + ':' + String(t.getMinutes()).padStart(2, '0');
  
  let ticks = '';
  if (type === 'sent') {
    if (read) ticks = '<span style="color:#34b7f1;font-size:11px;">✓✓</span>';
    else if (delivered) ticks = '<span style="color:#999;font-size:11px;">✓✓</span>';
    else ticks = '<span style="color:#999;font-size:11px;">✓</span>';
  }

  div.innerHTML = `${senderName ? `<div class="sender-name">${senderName}</div>` : ''}<div class="msg-text">${content}</div><div class="msg-time">${timeStr} ${ticks}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

  function scrollToBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

    currentChat = null;
    document.getElementById('chat-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('typing-indicator').textContent = '';
  }

async function openSearchModal() {
  document.getElementById('search-modal').style.display = 'flex';

  document.getElementById('search-results').innerHTML = '';
}

function closeSearchModal() {

}

async function searchUsers(query) {
  if (query.length < 2) {
    document.getElementById('search-results').innerHTML = '';
    return;
  }
  try {
    const res = await fetch(`/api/contacts/search?query=${query}`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const users = await res.json();
    const results = document.getElementById('search-results');
    if (users.length === 0) {
      results.innerHTML = '<p style="text-align:center;color:#999;">No users found!</p>';
      return;
    }
    results.innerHTML = users.map(u => `
      <div style="display:flex;align-items:center;gap:10px;padding:10px;background:#f5f5f5;border-radius:10px;">
        <div style="width:40px;height:40px;border-radius:50%;background:#075e54;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;overflow:hidden;flex-shrink:0;">
          ${u.avatar ? `<img src="${u.avatar}" style="width:40px;height:40px;object-fit:cover;">` : u.name[0].toUpperCase()}
        </div>
        <div style="flex:1;">
          <div style="font-weight:bold;">${u.name}</div>
          <div style="font-size:12px;color:#999;">${u.phone || u.email}</div>
        </div>
        <button onclick="sendContactRequest('${u._id}', this)" style="background:#075e54;color:white;border:none;padding:6px 12px;border-radius:15px;cursor:pointer;font-size:13px;">+ Add</button>
      </div>
    `).join('');
  } catch (err) {
    console.log('Search error:', err);
  }
}

async function sendContactRequest(userId, btn) {
  try {
    const res = await fetch('/api/contacts/request', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({ userId })
    });
    const data = await res.json();
    if (res.ok) {
      btn.textContent = '✅ Sent';
      btn.disabled = true;
      btn.style.background = '#ccc';
    } else {
      alert(data.message);
    }
  } catch (err) {
    alert('Something went wrong!');
  }
}

async function openRequestsModal() {

}

function closeRequestsModal() {

async function loadRequests() {
  try {
    const res = await fetch('/api/contacts/pending', {
      headers: { Authorization: `Bearer ${token}` }
    });
    const requests = await res.json();
    const list = document.getElementById('requests-list');

      list.innerHTML = '<p style="text-align:center;color:#999;">No pending requests!</p>';
      return;
    }
    list.innerHTML = requests.map(u => `
      <div style="display:flex;align-items:center;gap:10px;padding:10px;background:#f5f5f5;border-radius:10px;">
        <div style="width:40px;height:40px;border-radius:50%;background:#075e54;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;overflow:hidden;flex-shrink:0;">
          ${u.avatar ? `<img src="${u.avatar}" style="width:40px;height:40px;object-fit:cover;">` : u.name[0].toUpperCase()}
        </div>
        <div style="flex:1;">
          <div style="font-weight:bold;">${u.name}</div>
          <div style="font-size:12px;color:#999;">${u.phone || u.email}</div>

        <button onclick="acceptRequest('${u._id}', this)" style="background:#25d366;color:white;border:none;padding:6px 12px;border-radius:15px;cursor:pointer;font-size:13px;">✅</button>

}

async function acceptRequest(userId, btn) {

async function openProfileModal() {
  document.getElementById('profile-modal').style.display = 'flex';
  try {
    const res = await fetch('/api/profile/me', {
      headers: { Authorization: `Bearer ${token}` }
    });
    const user = await res.json();

function closeProfileModal() {
  document.getElementById('profile-modal').style.display = 'none';
}

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;

  document.getElementById('upload-status').textContent = 'Uploading...';

  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    try {
      const res = await fetch('/api/profile/avatar', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ imageBase64: base64 })
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('profile-avatar-preview').innerHTML = 
          `<img src="${data.avatar}" style="width:80px;height:80px;object-fit:cover;">`;
        document.getElementById('upload-status').textContent = '✅ Photo updated!';
      } else {
        document.getElementById('upload-status').textContent = '❌ Upload failed!';
      }
    } catch (err) {
      document.getElementById('upload-status').textContent = '❌ Upload failed!';
    }
  };
  reader.readAsDataURL(file);
}

async function saveProfile() {
  const name = document.getElementById('profile-name-input').value.trim();
  const about = document.getElementById('profile-about-input').value.trim();

  if (!name) { alert('Please enter your name!'); return; }

  try {
    const res = await fetch('/api/profile/update', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({ name, about })
    });
    if (res.ok) {
      closeProfileModal();
      showNotification('✅ Profile updated!');
      await loadUsers();
    }
  } catch (err) {
    alert('Could not save profile!');
  }
}
  function openGroupModal() {
    const memberList = document.getElementById('member-list');
    memberList.innerHTML = allUsers.map(u => `
      <div class="member-item">
        <input type="checkbox" id="member-${u._id}" value="${u._id}"/>

    document.getElementById('group-modal').classList.add('show');

  function closeGroupModal() {
    document.getElementById('group-modal').classList.remove('show');
    document.getElementById('group-name-input').value = '';
  }

  async function createGroup() {
    const name = document.getElementById('group-name-input').value.trim();
    if (!name) { alert('Please enter a group name!'); return; }
    const checked = [...document.querySelectorAll('#member-list input:checked')].map(i => i.value);
    if (checked.length === 0) { alert('Please select at least one member!'); return; }

    const res = await fetch('/api/chat/groups', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ name, members: checked })
    });
    const group = await res.json();
    closeGroupModal();
    await loadGroups();
    showTab('groups');
    showNotification(`👥 Group "${name}" created!`);
  }

  // ==================== NOTIFICATIONS ====================

  function requestNotificationPermission() {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }

  function showNotification(text) {
    const el = document.getElementById('notification');
    el.textContent = text;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function sendPushNotification(title, body) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(title, { body, icon: '/icon.png' });
    }
  }

  // ==================== SOCKET EVENTS ====================

  socket.on('online-users', (userIds) => {
    allUsers = allUsers.map(u => ({ ...u, online: userIds.includes(u._id) }));
    renderPeople();
  });

  socket.on('private-message', (data) => {
    if (currentChat && currentChat.type === 'private' && currentChat.id === data.senderId) {
      addMessage(data.content, 'received', '', data.createdAt);
      scrollToBottom();
    } else {
      unreadCounts[data.senderId] = (unreadCounts[data.senderId] || 0) + 1;
      renderPeople();
    }
  });

  socket.on('group-message', (data) => {
    if (currentChat && currentChat.type === 'group' && currentChat.id === data.groupId) {
      addMessage(data.content, 'received', data.senderName, data.createdAt);
      scrollToBottom();
    } else {
      unreadCounts[data.groupId] = (unreadCounts[data.groupId] || 0) + 1;
      loadGroups();
    }
  });

  socket.on('notification', (data) => {
    if (data.type === 'private') {
      showNotification(`💬 ${data.from}: ${data.content}`);
      sendPushNotification(`ZG Connect - ${data.from}`, data.content);
    } else {
      showNotification(`👥 ${data.from} in ${data.groupName}: ${data.content}`);
      sendPushNotification(`ZG Connect - ${data.groupName}`, `${data.from}: ${data.content}`);
    }
  });

  socket.on('typing', (data) => {
    if (currentChat && currentChat.id === data.senderId) {
      document.getElementById('typing-indicator').textContent = `${data.senderName} is typing...`;
    }
  });

  socket.on('stop-typing', (data) => {
    if (currentChat && currentChat.id === data.senderId) {
      document.getElementById('typing-indicator').textContent = '';
    }
  });

  // ==================== AUTO LOGIN ====================
  if (token && currentUser) {
    startApp();
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
